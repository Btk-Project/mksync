name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-cpp23:
    name: Linux / Clang 18 / C++23 / tests and GUI
    runs-on: ubuntu-24.04
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-18 \
            g++-14 \
            libei-dev \
            libfmt-dev \
            libgmock-dev \
            libgtest-dev \
            libportal-dev \
            libspdlog-dev \
            libwayland-bin \
            libwayland-dev \
            libxcb1-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-xinput-dev \
            libxcb-xtest0-dev \
            libxkbcommon-dev \
            pkg-config \
            qml6-module-qtquick \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-dialogs \
            qml6-module-qtquick-layouts \
            qt6-base-dev \
            qt6-declarative-dev \
            wayland-protocols \
            x11proto-dev

      - name: Report Linux compiler toolchain
        run: |
          "$CXX" --version
          "$CXX" -v -E -x c++ /dev/null

      - name: Install Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.9
          package-cache: true
          project-path: .

      - name: Configure C++23
        run: >-
          xmake f -c -y -m debug --stdcxx=23 --enable_gui=y --enable_tests=y
          --ccache=n --qt=/usr

      - name: Build CLI and GUI
        run: |
          xmake build mksync
          xmake build mksync-gui

      - name: Run tests
        run: xmake test

      - name: Verify a backend-free build
        run: |
          xmake f -c -m debug --stdcxx=23 --enable_gui=n --enable_tests=n --ccache=n \
            --enable_backend_x11=n \
            --enable_backend_wayland_wlr=n \
            --enable_backend_wayland_portal=n
          xmake show -t mksync > /tmp/mksync-target.txt
          if grep -Eq 'src/platform/(xcb|wayland|wayland_portal)\.cpp' /tmp/mksync-target.txt; then
            echo "A disabled Linux backend is still part of the target" >&2
            exit 1
          fi
          xmake build mksync

  windows-cpp23:
    name: Windows / C++23 / CLI and GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.9
          package-cache: true
          project-path: .

      - name: Configure C++23
        shell: pwsh
        run: >-
          xmake f -c -y -p windows -a x64 -m debug --stdcxx=23 --enable_gui=y
          --enable_tests=n --ccache=n

      - name: Build CLI and GUI
        run: |
          xmake build mksync
          xmake build mksync-gui

