name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - id: version
        name: Match the tag and project version
        shell: bash
        run: |
          project_version="$(sed -n 's/^set_version("\([^"]*\)".*/\1/p' xmake.lua | head -n 1)"
          tag_version="${RELEASE_TAG#v}"
          if [[ -z "$project_version" || "$project_version" != "$tag_version" ]]; then
            echo "Tag $RELEASE_TAG does not match xmake.lua version $project_version" >&2
            exit 1
          fi
          echo "value=$project_version" >> "$GITHUB_OUTPUT"

  linux:
    name: Package Linux on Ubuntu 26.04 with Clang 19
    needs: metadata
    runs-on: ubuntu-26.04
    env:
      CC: clang-19
      CXX: clang++-19
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install packaging and Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-19 \
            debhelper \
            devscripts \
            g++ \
            libei-dev \
            libfmt-dev \
            libportal-dev \
            libspdlog-dev \
            libwayland-bin \
            libwayland-dev \
            libxcb1-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-xinput-dev \
            libxcb-xtest0-dev \
            libxkbcommon-dev \
            pkg-config \
            qml6-module-qtquick \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-dialogs \
            qml6-module-qtquick-layouts \
            qt6-base-dev \
            qt6-declarative-dev \
            wayland-protocols \
            x11proto-dev

      - name: Report Linux compiler toolchain
        run: |
          "$CXX" --version
          "$CXX" -v -E -x c++ /dev/null
          portal_version="$(pkg-config --modversion libportal)"
          echo "libportal $portal_version"
          if ! pkg-config --atleast-version=0.8.0 libportal; then
            echo "libportal 0.8.0 or newer is required; found $portal_version" >&2
            exit 1
          fi
          portal_header="$(pkg-config --variable=includedir libportal)/libportal/inputcapture.h"
          if [[ ! -f "$portal_header" ]]; then
            echo "libportal InputCapture header is missing: $portal_header" >&2
            exit 1
          fi
          printf '%s\n' \
            '#include <expected>' \
            'template <typename T> struct Aggregate { T value; };' \
            'template <typename T> using Alias = Aggregate<T>;' \
            'Alias alias{42};' \
            'static_assert(std::expected<int, int>{42}.has_value());' \
            | "$CXX" -std=c++23 -fsyntax-only -x c++ -

      - name: Install Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.9
          package-cache: true
          project-path: .

      - name: Configure release build
        run: >-
          xmake f -c -y -m release --stdcxx=23 --enable_gui=y --enable_tests=n
          --ccache=n --qt=/usr

      - name: Build Linux packages
        run: |
          xmake build mksync
          xmake build mksync-gui
          xmake pack -f targz,deb -o dist

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: mksync-linux-${{ needs.metadata.outputs.version }}
          path: dist/*
          if-no-files-found: error

  windows:
    name: Package Windows
    needs: metadata
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.9
          package-cache: true
          project-path: .

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Configure release build
        shell: pwsh
        run: >-
          xmake f -c -y -p windows -a x64 -m release --stdcxx=23 --enable_gui=y
          --enable_tests=n --ccache=n

      - name: Build Windows packages
        run: |
          xmake build mksync
          xmake build mksync-gui
          xmake pack -f nsis,zip -o dist

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: mksync-windows-${{ needs.metadata.outputs.version }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [metadata, linux, windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all platform packages
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Create the release and upload packages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' files < <(find release-assets -maxdepth 1 -type f -print0)
          if (( ${#files[@]} == 0 )); then
            echo "No release assets were downloaded" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --verify-tag \
            --generate-notes \
            --title "mksync $RELEASE_TAG"
